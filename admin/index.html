<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogIt Admin — Venues & Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e17;
      color: #e8eaf6;
      min-height: 100vh;
    }
    header {
      background: rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(0,255,194,0.15);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #00FFC2; }
    header span { font-size: 13px; color: #7a8aaa; }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
    }
    .tab {
      padding: 8px 20px;
      border-radius: 8px 8px 0 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
      background: rgba(255,255,255,0.03);
      color: #7a8aaa;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .tab:hover { background: rgba(255,255,255,0.06); }
    .tab.active {
      background: rgba(0,255,194,0.08);
      color: #00FFC2;
      border-color: rgba(0,255,194,0.2);
    }

    .controls {
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #e8eaf6;
      font-size: 13px;
      outline: none;
    }
    .search-box:focus { border-color: rgba(0,255,194,0.3); }

    .filter-row {
      padding: 0 24px 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #556;
      margin-right: 2px;
      font-weight: 600;
    }
    .chip {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #7a8aaa;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover { background: rgba(255,255,255,0.06); color: #c0c8e0; }
    .chip.active {
      background: rgba(0,255,194,0.1);
      color: #00FFC2;
      border-color: rgba(0,255,194,0.25);
    }
    .chip-divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.08);
      margin: 0 4px;
    }

    .count-label {
      font-size: 12px;
      color: #7a8aaa;
      letter-spacing: 0.5px;
      margin-left: auto;
    }

    .table-wrap {
      padding: 0 24px 16px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      position: sticky;
      top: 0;
      background: #0d1220;
      text-align: left;
      padding: 8px 10px;
      color: #7a8aaa;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { color: #00FFC2; }
    th.sorted { color: #00FFC2; }
    th.sorted::after { content: ' ▲'; font-size: 9px; }
    th.sorted.desc::after { content: ' ▼'; }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .null-cell { color: #ff6b6b; font-style: italic; font-size: 11px; }
    .ok-cell { color: #51cf66; }
    .img-preview {
      width: 60px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .img-preview:hover { opacity: 0.75; }
    .img-cell { display: flex; align-items: center; gap: 6px; }
    .img-edit-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #7a8aaa;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .img-edit-btn:hover { background: rgba(0,255,194,0.1); color: #00FFC2; border-color: rgba(0,255,194,0.25); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      cursor: default;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 10000;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }
    .lightbox-caption {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #aab;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 6px 16px;
      border-radius: 6px;
      max-width: 80vw;
      text-align: center;
      word-break: break-all;
    }
    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .status-upcoming { background: rgba(0,255,194,0.12); color: #00FFC2; }
    .status-completed { background: rgba(255,138,61,0.15); color: #FF8A3D; }
    .status-in_progress { background: rgba(255,69,69,0.15); color: #ff4545; }

    .loading {
      text-align: center;
      padding: 60px;
      color: #7a8aaa;
      font-size: 14px;
    }
    .error-msg {
      text-align: center;
      padding: 40px;
      color: #ff6b6b;
      font-size: 14px;
    }
    .enrichment-status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .enrichment-ok { background: #51cf66; }
    .enrichment-partial { background: #ffd43b; }
    .enrichment-missing { background: #ff6b6b; }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 16px 24px 40px;
    }
    .page-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #7a8aaa;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .page-btn:hover { background: rgba(255,255,255,0.06); color: #e8eaf6; }
    .page-btn.active {
      background: rgba(0,255,194,0.1);
      color: #00FFC2;
      border-color: rgba(0,255,194,0.25);
    }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-info {
      font-size: 11px;
      color: #556;
      padding: 0 8px;
    }

    /* Gallery View */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 0 24px 16px;
    }
    .gallery-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .gallery-card:hover { border-color: rgba(0,255,194,0.3); }
    .gallery-img-wrap {
      width: 100%;
      height: 160px;
      position: relative;
      background: #0d1220;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .gallery-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gallery-img:hover { opacity: 0.8; }
    .gallery-missing-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a8aaa;
      font-size: 13px;
      font-style: italic;
    }
    .gallery-info {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .gallery-venue-name { font-weight: 600; font-size: 15px; color: #e8eaf6; margin-bottom: 4px; }
    .gallery-venue-details { font-size: 12px; color: #7a8aaa; margin-bottom: 12px; }
    .gallery-map {
      width: 100%;
      height: 80px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      background: #0d1220;
      margin-bottom: 12px;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .gallery-map:hover { opacity: 1; }
    .gallery-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .gallery-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e8eaf6;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
    }
    .gallery-btn:hover { background: rgba(0,255,194,0.15); color: #00FFC2; border-color: rgba(0,255,194,0.3); }
  </style>
</head>
<body>

<header>
  <h1>LogIt Admin</h1>
  <span>Venues & Games Data Viewer</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('venues')">Venues</div>
  <div class="tab" onclick="switchTab('gallery')">Gallery View</div>
  <div class="tab" onclick="switchTab('games')">Games</div>
</div>

<div class="controls">
  <input type="text" class="search-box" id="searchInput" placeholder="Search..." oninput="applyFilters()">
  <span class="count-label" id="countLabel"></span>
</div>

<div class="filter-row" id="filterRow"></div>

<div class="table-wrap">
  <div id="content" class="loading">Loading...</div>
</div>

<div class="pagination" id="pagination"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  // Write client uses service role key (bypasses RLS for admin edits)
  const sbWrite = (typeof SUPABASE_SERVICE_KEY !== 'undefined' && SUPABASE_SERVICE_KEY)
    ? supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY)
    : sb;
  let currentTab = 'venues';
  let allData = [];
  let filteredData = [];
  let sortCol = null;
  let sortAsc = true;
  let currentPage = 1;
  const PAGE_SIZE = 50;

  // Active filters
  let filters = {};

  // ── Data Loading ──────────────────────────────

  async function loadVenues() {
    const { data, error } = await sb.from('venues').select('*').order('name');
    if (error) throw error;
    return data || [];
  }

  async function loadGames() {
    const { data, error } = await sb
      .from('events')
      .select('id, external_id, title, event_date, status, venue_name, venue_city, venue_state, image_url, sports_events(*)')
      .order('event_date', { ascending: false })
      .limit(2000);
    if (error) throw error;
    return data || [];
  }

  // ── Filter Chips ──────────────────────────────

  function buildFilterChips() {
    const row = document.getElementById('filterRow');
    row.innerHTML = '';
    filters = {};

    if (currentTab === 'venues' || currentTab === 'gallery') {
      // Enrichment filter
      addFilterGroup(row, 'Enrichment', 'enrichment', ['All', 'Complete', 'Partial', 'Missing']);
      addDivider(row);
      // Source filter
      const sources = [...new Set(allData.map(v => v.external_source || 'none'))].sort();
      addFilterGroup(row, 'Source', 'source', ['All', ...sources]);
      addDivider(row);
      // Type filter (arena, stadium, etc.)
      const types = [...new Set(allData.map(v => v.venue_type).filter(Boolean))].sort();
      if (types.length > 0) {
        addFilterGroup(row, 'Type', 'venueType', ['All', ...types]);
      }
    } else {
      // Sport filter
      const sports = new Set();
      allData.forEach(g => {
        const se = Array.isArray(g.sports_events) ? g.sports_events[0] : g.sports_events;
        if (se?.sport) sports.add(se.sport);
      });
      if (sports.size > 0) {
        addFilterGroup(row, 'Sport', 'sport', ['All', ...Array.from(sports).sort()]);
        addDivider(row);
      }
      // League filter
      const leagues = new Set();
      allData.forEach(g => {
        const se = Array.isArray(g.sports_events) ? g.sports_events[0] : g.sports_events;
        if (se?.league) leagues.add(se.league);
      });
      addFilterGroup(row, 'League', 'league', ['All', ...Array.from(leagues).sort()]);
      addDivider(row);
      // Status filter
      addFilterGroup(row, 'Status', 'status', ['All', 'upcoming', 'in_progress', 'completed']);
      addDivider(row);
      // Has Score filter
      addFilterGroup(row, 'Score', 'hasScore', ['All', 'Has Score', 'No Score']);
      addDivider(row);
      // Season filter
      const seasons = new Set();
      allData.forEach(g => {
        const se = Array.isArray(g.sports_events) ? g.sports_events[0] : g.sports_events;
        if (se?.season) seasons.add(se.season);
      });
      if (seasons.size > 0) {
        addFilterGroup(row, 'Season', 'season', ['All', ...Array.from(seasons).sort().reverse()]);
        addDivider(row);
      }
      // City filter (top cities)
      const cityCounts = {};
      allData.forEach(g => { if (g.venue_city) cityCounts[g.venue_city] = (cityCounts[g.venue_city] || 0) + 1; });
      const topCities = Object.entries(cityCounts).sort((a, b) => b[1] - a[1]).slice(0, 8).map(e => e[0]);
      if (topCities.length > 0) {
        addFilterGroup(row, 'City', 'city', ['All', ...topCities]);
      }
    }
  }

  function addFilterGroup(container, label, key, options) {
    const lbl = document.createElement('span');
    lbl.className = 'filter-label';
    lbl.textContent = label;
    container.appendChild(lbl);

    filters[key] = 'All';
    options.forEach(opt => {
      const chip = document.createElement('span');
      chip.className = 'chip' + (opt === 'All' ? ' active' : '');
      chip.textContent = opt;
      chip.dataset.filterKey = key;
      chip.dataset.filterVal = opt;
      chip.onclick = () => {
        filters[key] = opt;
        container.querySelectorAll(`[data-filter-key="${key}"]`).forEach(c => c.classList.toggle('active', c.dataset.filterVal === opt));
        currentPage = 1;
        applyFilters();
      };
      container.appendChild(chip);
    });
  }

  function addDivider(container) {
    const d = document.createElement('span');
    d.className = 'chip-divider';
    container.appendChild(d);
  }

  // ── Filtering Logic ───────────────────────────

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();

    filteredData = allData.filter(row => {
      // Text search
      if (q && !Object.values(row).some(v => v != null && String(v).toLowerCase().includes(q))) return false;

      if (currentTab === 'venues' || currentTab === 'gallery') {
        // Enrichment filter
        if (filters.enrichment && filters.enrichment !== 'All') {
          const hasGeo = row.lat != null && row.lng != null;
          const hasImg = row.image_url != null;
          if (filters.enrichment === 'Complete' && !(hasGeo && hasImg)) return false;
          if (filters.enrichment === 'Partial' && ((!hasGeo && !hasImg) || (hasGeo && hasImg))) return false;
          if (filters.enrichment === 'Missing' && (hasGeo || hasImg)) return false;
        }
        // Source filter
        if (filters.source && filters.source !== 'All') {
          const src = row.external_source || 'none';
          if (src !== filters.source) return false;
        }
        // Venue type filter
        if (filters.venueType && filters.venueType !== 'All') {
          if ((row.venue_type || '') !== filters.venueType) return false;
        }
      } else {
        // Sport filter
        if (filters.sport && filters.sport !== 'All') {
          const se = Array.isArray(row.sports_events) ? row.sports_events[0] : row.sports_events;
          if (se?.sport !== filters.sport) return false;
        }
        // Status filter
        if (filters.status && filters.status !== 'All' && row.status !== filters.status) return false;
        // League filter
        if (filters.league && filters.league !== 'All') {
          const se = Array.isArray(row.sports_events) ? row.sports_events[0] : row.sports_events;
          if (se?.league !== filters.league) return false;
        }
        // Season filter
        if (filters.season && filters.season !== 'All') {
          const se = Array.isArray(row.sports_events) ? row.sports_events[0] : row.sports_events;
          if (se?.season !== filters.season) return false;
        }
        // Has Score filter
        if (filters.hasScore && filters.hasScore !== 'All') {
          const se = Array.isArray(row.sports_events) ? row.sports_events[0] : row.sports_events;
          const has = se && se.home_score != null;
          if (filters.hasScore === 'Has Score' && !has) return false;
          if (filters.hasScore === 'No Score' && has) return false;
        }
        // City filter
        if (filters.city && filters.city !== 'All' && row.venue_city !== filters.city) return false;
      }
      return true;
    });

    // Apply sort
    if (sortCol) doSort();

    renderPage();
  }

  // ── Sorting ───────────────────────────────────

  function sortBy(col) {
    if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
    doSort();
    currentPage = 1;
    renderPage();
  }

  function doSort() {
    if (!sortCol) return;
    filteredData.sort((a, b) => {
      const va = a[sortCol], vb = b[sortCol];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'number') return sortAsc ? va - vb : vb - va;
      return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }

  // ── Pagination ────────────────────────────────

  function renderPage() {
    const totalPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = filteredData.slice(start, start + PAGE_SIZE);

    document.getElementById('countLabel').textContent =
      `${filteredData.length} results${filteredData.length !== allData.length ? ` (of ${allData.length})` : ''}`;

    document.getElementById('content').innerHTML =
      currentTab === 'venues' ? renderVenuesTable(pageData) :
      currentTab === 'gallery' ? renderGallery(pageData) :
      renderGamesTable(pageData);

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(1)" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;
    html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

    // Show pages around current
    const range = 2;
    let startP = Math.max(1, currentPage - range);
    let endP = Math.min(totalPages, currentPage + range);

    if (startP > 1) html += `<span class="page-info">...</span>`;
    for (let p = startP; p <= endP; p++) {
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    if (endP < totalPages) html += `<span class="page-info">...</span>`;

    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
    html += `<button class="page-btn" onclick="goPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;
    html += `<span class="page-info">Page ${currentPage} of ${totalPages}</span>`;

    el.innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    renderPage();
    document.querySelector('.table-wrap').scrollTo(0, 0);
  }

  // ── Table Renderers ───────────────────────────

  function thClass(col) {
    if (sortCol !== col) return '';
    return ` class="sorted${sortAsc ? '' : ' desc'}"`;
  }

  function renderVenuesTable(data) {
    if (data.length === 0) return '<div class="loading">No venues match filters</div>';
    let html = `<table><thead><tr>
      <th onclick="sortBy('name')"${thClass('name')}>Name</th>
      <th onclick="sortBy('city')"${thClass('city')}>City</th>
      <th onclick="sortBy('state')"${thClass('state')}>State</th>
      <th onclick="sortBy('lat')"${thClass('lat')}>Lat</th>
      <th onclick="sortBy('lng')"${thClass('lng')}>Lng</th>
      <th>Image</th>
      <th onclick="sortBy('venue_type')"${thClass('venue_type')}>Type</th>
      <th onclick="sortBy('external_source')"${thClass('external_source')}>Source</th>
      <th>Enriched</th>
    </tr></thead><tbody>`;
    for (const v of data) {
      const hasGeo = v.lat != null && v.lng != null;
      const hasImg = v.image_url != null;
      const status = (hasGeo && hasImg) ? 'ok' : (!hasGeo && !hasImg) ? 'missing' : 'partial';
      html += `<tr>
        <td>${esc(v.name)}</td>
        <td>${esc(v.city)}</td>
        <td>${esc(v.state || '—')}</td>
        <td class="${v.lat != null ? 'ok-cell' : 'null-cell'}">${v.lat != null ? v.lat.toFixed(4) : 'null'}</td>
        <td class="${v.lng != null ? 'ok-cell' : 'null-cell'}">${v.lng != null ? v.lng.toFixed(4) : 'null'}</td>
        <td><div class="img-cell">
          ${hasImg ? `<img class="img-preview" src="${esc(v.image_url)}" alt="" loading="lazy" onclick="openLightbox('${esc(v.image_url).replace(/'/g, "\\'")}',' ${esc(v.name)}')">` : '<span class="null-cell">null</span>'}
          <button class="img-edit-btn" onclick="editVenueImage('${v.id}','${esc(v.name)}','${hasImg ? esc(v.image_url).replace(/'/g, "\\'") : ''}')">✏️</button>
        </div></td>
        <td>${esc(v.venue_type || '—')}</td>
        <td>${esc(v.external_source || '—')}</td>
        <td><span class="enrichment-status enrichment-${status}"></span></td>
      </tr>`;
    }
    html += '</tbody></table>';
    return html;
  }

  function renderGallery(data) {
    if (data.length === 0) return '<div class="loading">No venues match filters</div>';
    let html = '<div class="gallery-grid">';
    for (const v of data) {
      const hasGeo = v.lat != null && v.lng != null;
      const hasImg = v.image_url != null;
      const status = (hasGeo && hasImg) ? 'ok' : (!hasGeo && !hasImg) ? 'missing' : 'partial';

      const mapIframe = hasGeo 
        ? `<iframe class="gallery-map" frameborder="0" src="https://maps.google.com/maps?q=${v.lat},${v.lng}&z=13&output=embed" loading="lazy"></iframe>`
        : `<div class="gallery-map" style="display:flex;align-items:center;justify-content:center;color:#556;font-size:11px;">No Coordinates</div>`;

      html += `<div class="gallery-card">
        <div class="gallery-img-wrap">
          ${hasImg 
            ? `<img class="gallery-img" src="${esc(v.image_url)}" alt="" loading="lazy" onclick="openLightbox('${esc(v.image_url).replace(/'/g, "\\'")}',' ${esc(v.name)}')">` 
            : `<div class="gallery-missing-img">No Image Available</div>`}
        </div>
        <div class="gallery-info">
          <div class="gallery-venue-name">${esc(v.name)}</div>
          <div class="gallery-venue-details">
            ${esc(v.city)}${v.state ? ', ' + esc(v.state) : ''} 
            <span style="opacity:0.5;margin-left:6px">• ${esc(v.external_source || 'custom')}</span>
            <span class="enrichment-status enrichment-${status}" style="float:right;margin-top:2px;"></span>
          </div>
          ${mapIframe}
          <div class="gallery-actions">
            <button class="gallery-btn" onclick="editVenueImage('${v.id}','${esc(v.name)}','${hasImg ? esc(v.image_url).replace(/'/g, "\\'") : ''}')">✏️ Edit Image URL</button>
          </div>
        </div>
      </div>`;
    }
    html += '</div>';
    return html;
  }

  function renderGamesTable(data) {
    if (data.length === 0) return '<div class="loading">No games match filters</div>';
    let html = `<table><thead><tr>
      <th onclick="sortBy('title')"${thClass('title')}>Title</th>
      <th onclick="sortBy('event_date')"${thClass('event_date')}>Date</th>
      <th onclick="sortBy('venue_name')"${thClass('venue_name')}>Venue</th>
      <th onclick="sortBy('venue_city')"${thClass('venue_city')}>City</th>
      <th onclick="sortBy('status')"${thClass('status')}>Status</th>
      <th>Score</th>
      <th onclick="sortBy('_league')"${thClass('_league')}>League</th>
      <th onclick="sortBy('_season')"${thClass('_season')}>Season</th>
      <th onclick="sortBy('_sport')"${thClass('_sport')}>Sport</th>
      <th onclick="sortBy('external_id')"${thClass('external_id')}>Ext. ID</th>
    </tr></thead><tbody>`;
    for (const g of data) {
      const se = Array.isArray(g.sports_events) ? g.sports_events[0] : g.sports_events;
      const score = se && se.home_score != null ? `${se.away_score} – ${se.home_score}` : '—';
      const league = se?.league || '—';
      const season = se?.season || '—';
      const sport = se?.sport || '—';
      // Stash computed fields for sorting
      g._league = league;
      g._season = season;
      g._sport = sport;
      const dateStr = g.event_date
        ? new Date(g.event_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
        : '—';
      html += `<tr>
        <td>${esc(g.title || '—')}</td>
        <td style="white-space:nowrap">${dateStr}</td>
        <td>${esc(g.venue_name || '—')}</td>
        <td>${esc(g.venue_city || '—')}</td>
        <td><span class="status-pill status-${g.status || ''}">${esc(g.status || '—')}</span></td>
        <td>${score}</td>
        <td>${esc(league)}</td>
        <td style="font-size:11px;color:#7a8aaa">${esc(season)}</td>
        <td style="font-size:11px;color:#7a8aaa">${esc(sport)}</td>
        <td style="font-size:10px;color:#556">${esc(g.external_id || '—')}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    return html;
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Tab Switching ─────────────────────────────

  async function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t) => {
      const isVenues = t.textContent === 'Venues' && tab === 'venues';
      const isGallery = t.textContent === 'Gallery View' && tab === 'gallery';
      const isGames = t.textContent === 'Games' && tab === 'games';
      t.classList.toggle('active', isVenues || isGallery || isGames);
    });
    document.getElementById('searchInput').value = '';
    sortCol = null;
    currentPage = 1;
    await loadData();
  }

  async function loadData() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Loading...</div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('filterRow').innerHTML = '';
    try {
      allData = (currentTab === 'venues' || currentTab === 'gallery') ? await loadVenues() : await loadGames();
      buildFilterChips();
      filteredData = [...allData];
      renderPage();
    } catch (err) {
      content.innerHTML = `<div class="error-msg">Error: ${esc(err.message)}</div>`;
    }
  }

  // Initial load
  loadData();
  // ── Lightbox ───────────────────────────────────────────────────
  function openLightbox(src, caption) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-caption').textContent = caption || '';
    lb.classList.add('open');
    document.addEventListener('keydown', closeLightboxOnEsc);
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
    document.removeEventListener('keydown', closeLightboxOnEsc);
  }
  function closeLightboxOnEsc(e) { if (e.key === 'Escape') closeLightbox(); }

  // ── Edit venue image URL ──────────────────────────────────────
  async function editVenueImage(venueId, venueName, currentUrl) {
    const newUrl = prompt(`Update image URL for ${venueName}:`, currentUrl || '');
    if (newUrl === null) return; // cancelled
    const value = newUrl.trim() || null;
    const { error } = await sb.from('venues').update({ image_url: value }).eq('id', venueId);
    if (error) {
      alert('Failed to update: ' + error.message);
    } else {
      alert('Updated!');
      loadData();
    }
  }
  </script>

  <!-- Lightbox modal -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>
</body>
</html>
